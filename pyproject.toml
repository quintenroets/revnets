[project.urls]
"Source Code" = "https://github.com/quintenroets/revnets"

[project.scripts]
revnets = "revnets.cli.entry_point:entry_point"
launch_revnets = "revnets.cli.launch:entry_point"

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.coverage.run]
command_line = "-m pytest tests"
omit = [
  "/tmp/*",
]

[tool.coverage.report]
precision = 4
fail_under = 100

[tool.mypy]
strict = true
no_implicit_reexport = false

[[tool.mypy.overrides]]
module = [
    "art.*",
    "kneed.*",
    "scipy.*",
    "sklearn.*",
    "torchsummary.*",
    "torchvision.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
pythonpath = [
    "src", ".",
]
addopts = "-p no:warnings"

[tool.ruff]
fix = true

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "ANN401",   # annotated with Any
    "D",        # docstrings
    "D1",       # missing docstrings
    "D200",     # one-line docstring
    "D203",     # conflicts with D211
    "D205",     # blank line between summary and description
    "D212",     # conflicts with D213
    "D401",     # imperative first line
    "G004",     # logging f-string
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = [
    "F401"  # unused import
]
"tests/*" = [
    "S101",    # assert used
    "PLR2004", # Magic value used in comparison
]

[tool.setuptools.package-data]
revnets = ["py.typed"]
